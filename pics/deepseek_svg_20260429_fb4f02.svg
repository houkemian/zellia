<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- 莫兰迪风格柔和渐变（蓝灰过渡到鼠尾草绿） -->
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B8FA1" />
      <stop offset="100%" stop-color="#8FBBA6" />
    </linearGradient>

    <!-- 极简现代投影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#64748B" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- 极简干净背景（暖白） -->
  <rect width="400" height="400" rx="96" fill="#FDFBF7" />

  <!-- 核心图形：守护“Z”与健康“心”的完美融合 -->
  <!-- 使用单一连续路径，表现家庭守护与健康执行的闭环 -->
  <g filter="url(#shadow)">
    <path d="M 120 120 
             C 190 120, 240 120, 280 120 
             C 310 140, 310 190, 270 220 
             C 240 245, 200 290, 200 290 
             C 160 245, 130 220, 130 220 
             C 90 190, 90 140, 120 120 Z" 
          fill="url(#zGrad)" />
  </g>

  <!-- 品牌英文标识区（仅限海外市场） -->
  <text x="200" y="360" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="900" fill="#7B8FA1" text-anchor="middle" letter-spacing="2">Zellia</text>
  
  <text x="200" y="390" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700" fill="#8FBBA6" text-anchor="middle" letter-spacing="4">FAMILY HEALTH</text>
</svg>