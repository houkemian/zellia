#version: '3.8'

# 定义日志模板 (YAML Anchor) - 这样可以避免重复写日志配置
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"


services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zellia-backend
    restart: unless-stopped
    ports:
      - "21001:8000"
    env_file:
      - ./backend/.env
    environment:
      # Inject full external PostgreSQL DSN, e.g.
      # postgresql+psycopg://user:password@db-host:5432/dbname
      # DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://zellia-redis-svc:6379/0
      test: "test"
    depends_on:
      zellia-redis-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - zellia-network

  zellia-redis-svc:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-zellia-redis}
    restart: unless-stopped
    ports:
      - "21739:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  zellia-network: 
    driver: bridge

volumes:
  redis_data:
